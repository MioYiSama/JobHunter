name: Build

on:
  push:
    branches:
      - main

jobs:
  build-micro-services:
    name: 构建微服务
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"

      - name: 配置 Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - name: 配置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建 Commons
        run: mvn -f commons install

      - name: 构建 Eureka Server
        run: mvn -f eureka-server package

      - name: 构建 Config Server
        run: mvn -f config-server package

      - name: 构建 Gateway Server
        run: mvn -f gateway-server package

      - name: 构建 User Service
        run: mvn -f user-service package

      - name: 构建 Auth Service
        run: mvn -f auth-service package

      - name: 上传工件
        uses: actions/upload-artifact@v4
        with:
          name: micro-services.jar
          path: |
            */target/*.jar

      - name: 上传 Eureka Server
        uses: docker/build-push-action@v6
        with:
          context: eureka-server
          push: true
          tags: mioyisama/eureka-server:latest